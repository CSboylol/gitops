apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-3-qa
  namespace: app-3-qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-3-qa
  template:
    metadata:
      labels:
        app: app-3-qa
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
