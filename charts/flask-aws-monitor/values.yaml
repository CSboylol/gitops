replicaCount: 5

image:
  repository: csboylol23/flask-aws-monitor
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

env:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  host: flask.local
