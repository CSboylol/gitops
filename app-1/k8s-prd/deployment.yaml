apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-1-prd
  namespace: app-1-prd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-1-prd
  template:
    metadata:
      labels:
        app: app-1-prd
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
