apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: qa-applicationset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: app-1-qa
            project: app-1
            cluster: k8s-qa
            namespace: app-1-qa
          - name: app-2-qa
            project: app-2
            cluster: k8s-qa
            namespace: app-2-qa
          - name: app-3-qa
            project: app-3
            cluster: k8s-qa
            namespace: app-3-qa
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: gitops-project
      source:
        repoURL: https://github.com/CSboylol/gitops.git
        targetRevision: application
        path: '{{project}}/{{cluster}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
